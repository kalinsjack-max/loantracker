<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>হাওলাত ট্র্যাকার | আপনার টাকার হিসাব রাখুন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f8fafc;
        }
        .card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <!-- Top Notification Banner -->
        <div id="summary-banner" class="mb-8 p-6 bg-red-600 text-white rounded-2xl shadow-xl flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
            <div>
                <p class="text-red-100 text-sm font-medium uppercase tracking-wider">মানুষ আমার কাছে যত টাকা পাবে</p>
                <h1 class="text-4xl font-bold mt-1">৳ <span id="total-debt">0</span></h1>
            </div>
            <div class="bg-red-700 p-4 rounded-xl text-center min-w-[150px]">
                <p class="text-red-100 text-xs uppercase tracking-wider">আমি মোট যত টাকা পাবো</p>
                <p class="text-2xl font-semibold">৳ <span id="total-loan">0</span></p>
            </div>
        </div>

        <!-- Input Section -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-lg font-semibold mb-4 text-slate-800">নতুন লেনদেন যোগ করুন</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="person-name" placeholder="বন্ধুর নাম" class="p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                <input type="number" id="amount" placeholder="টাকার পরিমাণ" class="p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                <select id="type" class="p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    <option value="took">আমি নিয়েছি (আমি দেনাদার)</option>
                    <option value="gave">আমি দিয়েছি (আমি পাওনাদার)</option>
                </select>
                <button onclick="addHaulat()" class="bg-indigo-600 text-white font-bold py-3 px-6 rounded-lg hover:bg-indigo-700 transition-colors">
                    যোগ করুন
                </button>
            </div>
            <p id="msg-box" class="mt-3 text-sm hidden"></p>
        </div>

        <!-- Lists Section -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <!-- People I Took Money From -->
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xl font-bold text-slate-800">আমি যাদের কাছে দেনাদার</h3>
                    <span class="bg-red-100 text-red-600 px-3 py-1 rounded-full text-xs font-bold uppercase" id="count-debt">০ জন</span>
                </div>
                <div id="debt-list" class="space-y-3">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <!-- People I Gave Money To -->
            <div>
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xl font-bold text-slate-800">আমার কাছে যারা দেনাদার</h3>
                    <span class="bg-green-100 text-green-600 px-3 py-1 rounded-full text-xs font-bold uppercase" id="count-loan">০ জন</span>
                </div>
                <div id="loan-list" class="space-y-3">
                    <!-- Cards will be injected here -->
                </div>
            </div>

        </div>

        <footer class="mt-12 text-center text-slate-400 text-sm">
            <p>আপনার তথ্য আপনার ব্রাউজারেই সংরক্ষিত আছে।</p>
        </footer>
    </div>

    <script>
        let haulats = JSON.parse(localStorage.getItem('haulats')) || [];

        function save() {
            localStorage.setItem('haulats', JSON.stringify(haulats));
            render();
        }

        function showMessage(text, isError = false) {
            const box = document.getElementById('msg-box');
            box.innerText = text;
            box.className = `mt-3 text-sm ${isError ? 'text-red-500' : 'text-green-500'}`;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 3000);
        }

        function addHaulat() {
            const nameInput = document.getElementById('person-name');
            const amountInput = document.getElementById('amount');
            const typeInput = document.getElementById('type');

            const name = nameInput.value.trim();
            const amount = parseFloat(amountInput.value);
            const type = typeInput.value;

            if (!name || isNaN(amount) || amount <= 0) {
                showMessage("দয়া করে সঠিক নাম এবং টাকার পরিমাণ লিখুন।", true);
                return;
            }

            // Check if person already exists in this category
            const existingIndex = haulats.findIndex(h => h.name.toLowerCase() === name.toLowerCase() && h.type === type);

            if (existingIndex > -1) {
                // Update existing record
                haulats[existingIndex].amount += amount;
                showMessage(`${haulats[existingIndex].name} এর মোট হিসেবে ৳${amount} যোগ করা হয়েছে।`);
            } else {
                // Add new record
                haulats.push({
                    id: Date.now(),
                    name: name,
                    amount: amount,
                    type: type
                });
                showMessage(`${name} এর জন্য নতুন রেকর্ড তৈরি করা হয়েছে।`);
            }

            nameInput.value = '';
            amountInput.value = '';
            save();
        }

        function deleteHaulat(id) {
            haulats = haulats.filter(h => h.id !== id);
            save();
        }

        function render() {
            const debtList = document.getElementById('debt-list');
            const loanList = document.getElementById('loan-list');
            const totalDebtEl = document.getElementById('total-debt');
            const totalLoanEl = document.getElementById('total-loan');
            const countDebtEl = document.getElementById('count-debt');
            const countLoanEl = document.getElementById('count-loan');

            debtList.innerHTML = '';
            loanList.innerHTML = '';

            let totalDebt = 0;
            let totalLoan = 0;
            let debtCount = 0;
            let loanCount = 0;

            haulats.forEach(h => {
                const card = document.createElement('div');
                card.className = "card bg-white p-4 rounded-xl border border-slate-200 flex justify-between items-center";
                card.innerHTML = `
                    <div>
                        <p class="font-bold text-slate-800">${h.name}</p>
                        <p class="text-indigo-600 font-semibold">৳ ${h.amount}</p>
                    </div>
                    <button onclick="deleteHaulat(${h.id})" class="text-slate-400 hover:text-red-500 transition-colors p-2" title="রেকর্ড মুছুন">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                    </button>
                `;

                if (h.type === 'took') {
                    debtList.appendChild(card);
                    totalDebt += h.amount;
                    debtCount++;
                } else {
                    loanList.appendChild(card);
                    totalLoan += h.amount;
                    loanCount++;
                }
            });

            // Update UI Counters
            totalDebtEl.innerText = totalDebt.toLocaleString('bn-BD');
            totalLoanEl.innerText = totalLoan.toLocaleString('bn-BD');
            countDebtEl.innerText = `${debtCount.toLocaleString('bn-BD')} জন`;
            countLoanEl.innerText = `${loanCount.toLocaleString('bn-BD')} জন`;

            // Empty states
            if (debtCount === 0) {
                debtList.innerHTML = `<p class="text-slate-400 text-sm italic">কোন দেনার রেকর্ড নেই।</p>`;
            }
            if (loanCount === 0) {
                loanList.innerHTML = `<p class="text-slate-400 text-sm italic">কোন পাওনার রেকর্ড নেই।</p>`;
            }
        }

        // Initial render
        render();
    </script>
</body>
</html>
